<html>

<head>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <title>步尔斯特记事本</title>
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="googlebot" content="noindex, nofollow" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" type="text/css" href="./css/todoList-test.css" />
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</head>

<body>

  <div id="app">
    <p>步尔斯特记事本</p>
    <div class="content">
      <input type="text" v-model="inputValue" @keyup.enter="add"  placeholder="请输入待办事项">
      <ul>
        <li v-for="(item, index) in list" :key="index">
          <span>{{ index + 1 }}.</span>
          <label>{{ item }}</label>
          <button type="button" @click="remove(index)">删除</button>
        </li>
      </ul>
    </div>
    <div class="footer" v-if=list.length!=0>
      <label>{{list.length}}</label>
      <button type="button" @click="clear">clear</button>
    </div>
  </div>


  <script>
    var app = new Vue({
      el: '#app',
      data: {
        inputValue: '',
        list: ["123", "456", "789"]
      },
      methods: {
        add: function () {
          this.list.push(this.inputValue)
        },
        remove: function (index) {
          this.list.splice(index, 1)
        },
        clear: function () {
          this.list = []
        }
      }
    })
  </script>
</body>

</html>
